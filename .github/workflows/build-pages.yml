name: Build SEO pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate static pages
        run: node scripts/build-pages.js

      - name: Commit & push generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/negocio docs/ciudad docs/categoria docs/sitemap.xml || true
          git diff --cached --quiet || git commit -m "chore: regenerate SEO pages [skip ci]"
          git push
