name: Generate Blog Posts

on:
  schedule:
    # 1 artículo a las 8am UTC, de lunes a viernes (días 1-5).
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      count:
        description: 'Número de artículos a generar'
        default: '1'
        type: string

permissions:
  contents: write

concurrency:
  group: generate-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COUNT: ${{ github.event.inputs.count || '1' }}
        run: node scripts/generate-blog.js

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/blog/ docs/sitemap.xml scripts/blog-state.json || true
          git diff --cached --quiet || git commit -m "chore: generate blog posts [skip ci]"
          git push
