<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1117"/>
      <stop offset="100%" stop-color="#1C1F26"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7931A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F7931A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow top -->
  <ellipse cx="600" cy="0" rx="500" ry="200" fill="url(#glow)"/>

  <!-- Venezuelan flag stripe at bottom -->
  <rect x="0" y="610" width="400" height="20" fill="#CF9B00"/>
  <rect x="400" y="610" width="400" height="20" fill="#003893"/>
  <rect x="800" y="610" width="400" height="20" fill="#CF142B"/>

  <!-- Flag icon -->
  <g transform="translate(134, 200)">
    <rect width="68" height="14" rx="2" fill="#CF9B00"/>
    <rect y="14" width="68" height="14" rx="0" fill="#003893"/>
    <rect y="28" width="68" height="14" rx="2" fill="#CF142B"/>
  </g>

  <!-- Map pin icon -->
  <g transform="translate(530, 160)">
    <circle cx="70" cy="55" r="55" fill="#F7931A" opacity="0.12"/>
    <circle cx="70" cy="50" r="26" fill="#F7931A"/>
    <circle cx="70" cy="50" r="11" fill="#0F1117"/>
    <path d="M70 76 Q50 105 70 125 Q90 105 70 76Z" fill="#F7931A"/>
  </g>

  <!-- Title -->
  <text x="600" y="325" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="72" fill="#E8EAED" text-anchor="middle" letter-spacing="-1">CriptoMapa Venezuela</text>

  <!-- Subtitle -->
  <text x="600" y="390" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="32" fill="#9AA0AC" text-anchor="middle">Negocios venezolanos que aceptan criptomonedas</text>

  <!-- Crypto pills -->
  <g transform="translate(270, 430)">
    <!-- BTC -->
    <rect width="130" height="44" rx="22" fill="#F7931A" opacity="0.15"/>
    <circle cx="22" cy="22" r="14" fill="#F7931A"/>
    <text x="22" y="27" font-family="Arial" font-weight="700" font-size="13" fill="#0F1117" text-anchor="middle">₿</text>
    <text x="70" y="28" font-family="Arial" font-weight="600" font-size="18" fill="#F7931A" text-anchor="middle">Bitcoin</text>

    <!-- USDT -->
    <rect x="145" width="120" height="44" rx="22" fill="#26A17B" opacity="0.15"/>
    <circle cx="167" cy="22" r="14" fill="#26A17B"/>
    <text x="167" y="27" font-family="Arial" font-weight="700" font-size="11" fill="#fff" text-anchor="middle">₮</text>
    <text x="215" y="28" font-family="Arial" font-weight="600" font-size="18" fill="#26A17B" text-anchor="middle">USDT</text>

    <!-- USDC -->
    <rect x="280" width="120" height="44" rx="22" fill="#2775CA" opacity="0.15"/>
    <circle cx="302" cy="22" r="14" fill="#2775CA"/>
    <text x="302" y="27" font-family="Arial" font-weight="700" font-size="11" fill="#fff" text-anchor="middle">$</text>
    <text x="350" y="28" font-family="Arial" font-weight="600" font-size="18" fill="#2775CA" text-anchor="middle">USDC</text>

    <!-- Binance -->
    <rect x="415" width="175" height="44" rx="22" fill="#F3BA2F" opacity="0.15"/>
    <circle cx="437" cy="22" r="14" fill="#F3BA2F"/>
    <text x="437" y="28" font-family="Arial" font-weight="700" font-size="13" fill="#0F1117" text-anchor="middle">B</text>
    <text x="515" y="28" font-family="Arial" font-weight="600" font-size="16" fill="#F3BA2F" text-anchor="middle">Binance Pay</text>
  </g>

  <!-- URL -->
  <text x="600" y="575" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="24" fill="#2E3340" text-anchor="middle">criptomapavenezuela.com</text>
</svg>
